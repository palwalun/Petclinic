apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
 name: petclinic-ingress
 annotations:
  nginx.ingress.kubernetes.io/rewrite-target: /
spec:
 ingressClassName: nginx
 rules:
  - http:
     paths:
       - path: /
         pathType: Prefix
         backend:
           service:
             name: petclinic-service
             port:
              number: 80